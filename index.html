<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>স্যালারি কত!</title>
<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--primary:#7c3aed;--success:#10b981;--danger:#ef4444;
--glass:rgba(255,255,255,.18);--border:rgba(255,255,255,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
min-height:100vh;font-family:Montserrat,sans-serif;
background:linear-gradient(135deg,#6d28d9,#7c3aed,#4338ca);
color:#fff;display:flex;flex-direction:column}
header,footer{
backdrop-filter:blur(16px);
background:rgba(255,255,255,.08);
padding:20px 40px;
border-color:rgba(255,255,255,.15)
}
.header-wrap{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:"Anek Bangla",sans-serif;font-size:34px;font-weight:700}
.logo span{color:#fbbf24}
.container{max-width:1400px;margin:auto;width:100%;padding:35px;flex:1}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:25px}
.stat-card,.panel{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:22px}
.stat-card{padding:22px}
.stat-title{opacity:.8;margin-bottom:8px}
.stat-value{font-size:30px;font-weight:700}
.panel{overflow:hidden}
.form-section{padding:25px;border-bottom:1px solid rgba(255,255,255,.1)}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:15px}
input{padding:14px;border:none;border-radius:12px}
.btn{padding:14px 22px;border:none;border-radius:12px;color:#fff;cursor:pointer;font-weight:600}
.btn-primary{background:#10b981}.btn-export{background:#f59e0b}
.table-wrap{padding:20px}
table{width:100%;background:#fff;color:#111827;border-collapse:collapse;border-radius:18px;overflow:hidden}
th,td{padding:16px;border-bottom:1px solid #e5e7eb;text-align:left}
thead{background:#f3f4f6}
.delete-btn{background:#ef4444;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer}
footer{text-align:center}
@media(max-width:900px){.stats,.form-grid{grid-template-columns:1fr}.header-wrap{flex-direction:column;gap:10px}}
</style>
</head>
<body>
<header><div class="header-wrap"><div><div class="logo">💰 স্যালারি <span>কত!</span></div><div>Smart Salary & Timesheet Tracker</div></div><button class="btn btn-export" onclick="exportCSV()">Export CSV</button></div></header>

<main class="container">
<div class="stats">
<div class="stat-card"><div class="stat-title">Total Earnings</div><div class="stat-value" id="totalSalary">৳110,210</div></div>
<div class="stat-card"><div class="stat-title">Total Time</div><div class="stat-value" id="totalTime">367:22</div></div>
<div class="stat-card"><div class="stat-title">Hourly Rate</div><div class="stat-value">৳300</div></div>
</div>

<div class="panel">
<div class="form-section">
<div class="form-grid">
<input id="month" placeholder="Month (Jun 2026)">
<input id="time" placeholder="HH:MM">
<input id="rate" type="number" value="300">
<button class="btn btn-primary" onclick="addEntry()">Save Entry</button>
</div>
</div>

<div class="table-wrap">
<h2 style="margin-bottom:15px">Salary History</h2>
<table>
<thead><tr><th>Month</th><th>Time</th><th>Decimal Hrs</th><th>Rate</th><th>Salary</th><th>Action</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>
</main>

<footer>© 2026 <span style="font-family:Anek Bangla">স্যালারি কত!</span> • Personal Salary Management Dashboard</footer>

<script>
const ADMIN_PASSWORD="64556455";
const STORAGE_KEY="timesheetData";
const initialData=[
{id:1,month:"Dec 2025",time:"73:35",rate:300},
{id:2,month:"Jan 2026",time:"114:32",rate:300},
{id:3,month:"Feb 2026",time:"45:09",rate:300},
{id:4,month:"Mar 2026",time:"47:03",rate:300},
{id:5,month:"Apr 2026",time:"60:07",rate:300},
{id:6,month:"May 2026",time:"26:56",rate:300}
];
if(!localStorage.getItem(STORAGE_KEY)){localStorage.setItem(STORAGE_KEY,JSON.stringify(initialData));}
function timeToDecimal(t){let[a,b]=t.split(':').map(Number);return a+b/60}
function money(v){return '৳'+Math.round(v).toLocaleString()}
function loadData(){
const data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let tb=document.getElementById('tableBody');tb.innerHTML='';
let totalH=0,totalS=0;
data.forEach(r=>{
const hrs=timeToDecimal(r.time), sal=hrs*r.rate;
totalH+=hrs; totalS+=sal;
tb.innerHTML+=`<tr><td>${r.month}</td><td>${r.time}</td><td>${hrs.toFixed(2)}</td><td>${r.rate}</td><td>${money(sal)}</td><td><button class="delete-btn" onclick="deleteEntry(${r.id})">Delete</button></td></tr>`;
});
document.getElementById('totalSalary').innerText=money(totalS);
let h=Math.floor(totalH),m=Math.round((totalH-h)*60);
document.getElementById('totalTime').innerText=`${h}:${String(m).padStart(2,'0')}`;
}
function addEntry(){
if(prompt('Enter Password')!==ADMIN_PASSWORD){alert('Wrong password');return;}
let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
data.push({id:Date.now(),month:month.value,time:time.value,rate:Number(rate.value)});
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));loadData();
}
function deleteEntry(id){
if(prompt('Enter Password')!==ADMIN_PASSWORD){alert('Wrong password');return;}
let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
data=data.filter(x=>x.id!==id);
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));loadData();
}
function exportCSV(){
const data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let csv='Month,Time,Rate\n';
data.forEach(r=>csv+=`${r.month},${r.time},${r.rate}\n`);
const a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
a.download='salary_history.csv';a.click();
}
loadData();
</script>
</body></html>
